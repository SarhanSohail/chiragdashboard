kind = "web"
previewPath = "/"
title = "Chirag Dashboard"
version = "1.0.0"
id = "artifacts/ram-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18614

[services.development]
run = "pnpm --filter @workspace/ram-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ram-dashboard", "run", "build" ]
publicDir = "artifacts/ram-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18614"
BASE_PATH = "/"
